name: hiop

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hiop}
      POSTGRES_USER: ${POSTGRES_USER:-hiop}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in the deployment environment}
    volumes:
      - hiop_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [hiop]

  migrate:
    build:
      context: ./backend
    command: ["alembic", "upgrade", "head"]
    restart: "no"
    environment: &backend_environment
      APP_NAME: Hotel IT Operations Portal
      APP_VERSION: ${APP_VERSION:-2.0.0-dev}
      ENVIRONMENT: production
      DEBUG: "false"
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL with URL-encoded database credentials}
      SECRET_KEY: ${SECRET_KEY:?Set SECRET_KEY to at least 32 random characters}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-60}
      CORS_ORIGINS: '["https://${HIOP_HOST:?Set HIOP_HOST to the production hostname}"]'
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      DATABASE_POOL_SIZE: ${DATABASE_POOL_SIZE:-10}
      DATABASE_MAX_OVERFLOW: ${DATABASE_MAX_OVERFLOW:-20}
      DATABASE_POOL_RECYCLE_SECONDS: ${DATABASE_POOL_RECYCLE_SECONDS:-1800}
      SCHEDULER_ENABLED: "true"
      EMAIL_ADDRESS: ${EMAIL_ADDRESS:-}
      EMAIL_PASSWORD: ${EMAIL_PASSWORD:-}
      EMAIL_RECIPIENT: ${EMAIL_RECIPIENT:-}
    depends_on:
      db:
        condition: service_healthy
    networks: [hiop]

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment: *backend_environment
    cap_add:
      - NET_RAW
    depends_on:
      migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=4)"]
      interval: 30s
      timeout: 5s
      start_period: 20s
      retries: 3
    networks: [hiop]

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    ports:
      - "${HIOP_HTTP_PORT:-8080}:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1/healthz"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    networks: [hiop]

networks:
  hiop:
    driver: bridge

volumes:
  hiop_postgres_data:
